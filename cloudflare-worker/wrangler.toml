name = "ipo-cron-worker"
main = "src/index-jwt.ts"
compatibility_date = "2024-01-01"

# Cron Triggers
[triggers]
crons = [
  "*/15 * * * *",   # Every 15 minutes - main cron jobs
  "30 6 * * *",     # 6:30 AM daily - GMP history scrape (morning)
  "30 16 * * *"     # 4:30 PM daily - GMP history scrape (evening)
]

# Environment Variables (required)
# Set these in Cloudflare Dashboard under Settings > Secrets & Variables
[vars]
API_BASE_URL = "https://your-domain.com"

# Note: Set these as secrets in Cloudflare Dashboard:
# - ADMIN_USERNAME = "admin"
# - ADMIN_PASSWORD = "your-admin-password"
