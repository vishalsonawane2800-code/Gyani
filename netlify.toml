# This project is configured for Cloudflare Pages deployment
# For Cloudflare Pages, the build and deploy configuration is in wrangler.toml
# Do NOT use this file for production builds - it will conflict with Cloudflare configuration

# If you need to use Netlify instead:
# 1. Change the build command to: next build
# 2. Update wrangler.toml command to: next build
# 3. Change publish path to: .next
# 4. This file should then work correctly

[build]
  command = "pnpm run build"
  publish = ".open-next/static"

[[plugins]]
  package = "@netlify/plugin-nextjs"
